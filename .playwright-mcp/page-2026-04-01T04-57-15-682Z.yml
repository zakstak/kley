rnings: {}\\\",\\n243: report.pass, report.fail, report.warn\\n244: ));\\n245: report.push_line(\\\"━━━━━━━━━━━━━━━━━━━━━━\\\");\\n246: report.blank_line();\\n247: \\n248: if report.fail > 0 {\\n249: report.push_line(\\\"⚠ Fix the failing checks above before continuing.\\\");\\n250: } else {\\n251: report.push_line(\\\"✓ All checks passed.\\\");\\n252: }\\n253: \\n254: report\\n255: }\\n256: \\n257: fn remote_exists(runner: &impl CommandRunner) -> bool {\\n258: runner\\n259: .run(&command(\\\"git\\\").args([\\\"remote\\\", \\\"get-url\\\", \\\"upstream\\\"]))\\n260: .success\\n\"}"
