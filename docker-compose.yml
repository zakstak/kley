---
services:
  kley:
    build:
      context: .
      network: host
    stdin_open: true
    tty: true
    network_mode: host
    environment:
      # Set this so the credential store works non-interactively.
      - KLEY_PASSPHRASE=${KLEY_PASSPHRASE-kley-dev-passphrase}
      - KLEY_WEB_AUTH_AUTO_RESET=${KLEY_WEB_AUTH_AUTO_RESET-1}
      # Optional bounded override for trusted credentials.age files.
      # Use when encrypted files were created with a higher scrypt work factor.
      - KLEY_AGE_MAX_WORK_FACTOR=${KLEY_AGE_MAX_WORK_FACTOR:-}
    volumes:
      # Mount the agent's working copy as the workspace
      - .:/workspace
      # Mount the saga-agent SSH key for git push/fetch
      - ${HOME}/.ssh/id_ed25519_saga_agent:/root/.ssh/id_ed25519:ro
      - ${HOME}/.ssh/id_ed25519_saga_agent.pub:/root/.ssh/id_ed25519.pub:ro
      # Persist kley OAuth credentials
      - kley-config:/root/.config/kley
      # Persist saga-agent's gh CLI auth
      - gh-config:/root/.config/gh
    working_dir: /workspace

volumes:
  kley-config:
  gh-config:
