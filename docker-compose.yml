services:
  kley:
    build: .
    stdin_open: true
    tty: true
    ports:
      - "1455:1455"
    volumes:
      # Mount the current directory as the workspace
      - .:/workspace
      # Mount SSH keys for git access
      - ~/.ssh/id_ed25519_saga_agent:/home/kleyuser/.ssh/id_ed25519:ro
      - ~/.ssh/id_ed25519_saga_agent.pub:/home/kleyuser/.ssh/id_ed25519.pub:ro
      # Persist OAuth credentials across container restarts
      - kley-config:/home/kleyuser/.config/kley
    working_dir: /workspace

volumes:
  kley-config:
